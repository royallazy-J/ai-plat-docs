apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-plat-docs
  namespace: ai-plat
  labels:
    app.kubernetes.io/name: ai-plat-docs
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-plat-docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-plat-docs
    spec:
      containers:
        - name: docs
          image: registry.customer.local/ai-plat/ai-plat-docs:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
